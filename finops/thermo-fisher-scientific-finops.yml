description: >-
  FOCUS-aligned FinOps scaffold for Thermo Fisher Scientific. Commercial relationships are a mix of consumables
  catalog purchasing, instrument capex / services, and digital-science software subscriptions; there is
  no public usage-based price list to map cleanly to FOCUS columns until the engagement is in place.
