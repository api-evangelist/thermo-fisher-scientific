meters:
  - name: digital_science_subscription
    unit: varies
    aggregation: sum
    dimensions:
      - product_line
principles:
  - name: Visibility
    description: Visibility surfaces are Thermo Fisher invoices, customer portal order history, and any
      LIMS / digital-science admin consoles included in the engagement.
  - name: Allocation
    description: Allocate spend across labs / programs based on Thermo Fisher PO and invoice line items
      keyed to lab cost centers.
  - name: Optimization
    description: Consolidate purchasing under negotiated agreements, retire unused digital-science modules
      at renewal, and align reagent reorder cadence with consumption.
  - name: Accountability
    description: Lab / program owner inside the customer organization owns Thermo Fisher spend and reviews
      against contractual baseline at renewal.
