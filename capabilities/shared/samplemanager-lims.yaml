naftiko: "1.0.0-alpha1"

info:
  label: "Thermo Fisher SampleManager LIMS API"
  description: "REST API for Thermo Scientific SampleManager LIMS system providing sample management, entity browsing, result entry, and workflow automation."
  tags:
    - LIMS
    - Laboratory
    - Life Sciences
    - Sample Management
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      SAMPLEMANAGER_TOKEN: SAMPLEMANAGER_TOKEN

capability:
  consumes:
    - type: http
      namespace: samplemanager
      baseUri: https://{server}:56105/smpwcfrestvgsm
      description: "Thermo Scientific SampleManager LIMS REST API."
      authentication:
        type: bearer
        token: "{{SAMPLEMANAGER_TOKEN}}"
      resources:
        - name: samples
          path: /mobile/samples
          description: "Laboratory sample records."
          operations:
            - name: get-samples
              method: GET
              description: "Retrieve laboratory samples with filtering by status and date."
              inputParameters:
                - name: status
                  in: query
                  type: string
                  required: false
                  description: "Sample status filter (A, C, X, L)."
                - name: from_date
                  in: query
                  type: string
                  required: false
                  description: "From date filter (YYYY-MM-DD)."
                - name: to_date
                  in: query
                  type: string
                  required: false
                  description: "To date filter (YYYY-MM-DD)."
                - name: pagesize
                  in: query
                  type: integer
                  required: false
                  description: "Records per page."
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: sample-by-id
          path: /mobile/samples/{sampleId}
          description: "Retrieve a specific sample by identity."
          operations:
            - name: get-sample-by-id
              method: GET
              description: "Get details for a specific laboratory sample."
              inputParameters:
                - name: sampleId
                  in: path
                  type: string
                  required: true
                  description: "Sample identity or barcode."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: sample-results
          path: /mobile/samples/{sampleId}/results
          description: "Test results for a sample."
          operations:
            - name: get-sample-results
              method: GET
              description: "Get all test results for a specific sample."
              inputParameters:
                - name: sampleId
                  in: path
                  type: string
                  required: true
                  description: "Sample identity."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: results-entry
          path: /mobile/results
          description: "Submit test results."
          operations:
            - name: submit-results
              method: POST
              description: "Submit test results for samples in SampleManager."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  sample_id: "{{tools.sample_id}}"
                  results: "{{tools.results}}"

        - name: entity-browse
          path: /mobile/browses/{entity}
          description: "Browse SampleManager entities."
          operations:
            - name: browse-entity
              method: GET
              description: "Browse records for any SampleManager entity type."
              inputParameters:
                - name: entity
                  in: path
                  type: string
                  required: true
                  description: "Entity name (SAMPLE, TEST, RESULT, CUSTOMER, etc.)."
                - name: criteria
                  in: query
                  type: string
                  required: false
                  description: "Filter criteria."
                - name: pagesize
                  in: query
                  type: integer
                  required: false
                  description: "Records per page."
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: workflow-trigger
          path: /mobile/workflows/{workflowName}/trigger
          description: "Trigger SampleManager workflows."
          operations:
            - name: trigger-workflow
              method: POST
              description: "Trigger a named workflow in SampleManager."
              inputParameters:
                - name: workflowName
                  in: path
                  type: string
                  required: true
                  description: "Workflow name to trigger."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data: {}

  exposes:
    - type: rest
      port: 8100
      namespace: samplemanager-rest
      resources:
        - path: /v1/samples
          name: samples
          description: "Laboratory sample management."
          operations:
            - method: GET
              name: get-samples
              description: "List laboratory samples."
              call: "samplemanager.get-samples"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/samples/{sampleId}
          name: sample
          description: "Individual sample data."
          operations:
            - method: GET
              name: get-sample
              description: "Get a specific sample."
              call: "samplemanager.get-sample-by-id"
              with:
                sampleId: "rest.sampleId"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/samples/{sampleId}/results
          name: sample-results
          description: "Sample test results."
          operations:
            - method: GET
              name: get-sample-results
              description: "Get test results for a sample."
              call: "samplemanager.get-sample-results"
              with:
                sampleId: "rest.sampleId"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: samplemanager-mcp
      transport: http
      tools:
        - name: get-samples
          description: "List laboratory samples from SampleManager LIMS with status and date filtering."
          hints:
            readOnly: true
            idempotent: true
          call: "samplemanager.get-samples"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-sample
          description: "Get details for a specific laboratory sample by identity or barcode."
          hints:
            readOnly: true
            idempotent: true
          call: "samplemanager.get-sample-by-id"
          with:
            sampleId: "tools.sampleId"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-sample-results
          description: "Get all test results for a laboratory sample."
          hints:
            readOnly: true
            idempotent: true
          call: "samplemanager.get-sample-results"
          with:
            sampleId: "tools.sampleId"
          outputParameters:
            - type: object
              mapping: "$."

        - name: submit-results
          description: "Submit test results for samples in SampleManager LIMS."
          hints:
            readOnly: false
          call: "samplemanager.submit-results"
          outputParameters:
            - type: object
              mapping: "$."

        - name: browse-entity
          description: "Browse any SampleManager LIMS entity (SAMPLE, TEST, RESULT, CUSTOMER, BATCH_HEADER, etc.)."
          hints:
            readOnly: true
            idempotent: true
          call: "samplemanager.browse-entity"
          with:
            entity: "tools.entity"
          outputParameters:
            - type: object
              mapping: "$."

        - name: trigger-workflow
          description: "Trigger a named workflow in SampleManager LIMS."
          hints:
            readOnly: false
          call: "samplemanager.trigger-workflow"
          with:
            workflowName: "tools.workflowName"
          outputParameters:
            - type: object
              mapping: "$."
