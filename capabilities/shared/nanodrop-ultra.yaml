naftiko: "1.0.0-alpha1"

info:
  label: "Thermo Fisher NanoDrop Ultra API"
  description: "Local REST API for the NanoDrop Ultra microvolume UV-Vis spectrophotometer providing instrument control, measurement execution, and data retrieval."
  tags:
    - Laboratory Instruments
    - Spectrophotometry
    - Life Sciences
    - UV-Vis
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      NANODROP_HOST: NANODROP_HOST

capability:
  consumes:
    - type: http
      namespace: nanodrop
      baseUri: "http://{{NANODROP_HOST}}:8080"
      description: "NanoDrop Ultra instrument local REST API."
      resources:
        - name: instrument-status
          path: /api/status
          description: "Instrument status and metadata."
          operations:
            - name: get-instrument-status
              method: GET
              description: "Get current status and readiness of the NanoDrop Ultra instrument."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: measure
          path: /api/measure
          description: "Perform a sample measurement."
          operations:
            - name: perform-measurement
              method: POST
              description: "Initiate a sample measurement using the specified method."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  method: "{{tools.method}}"
                  sample_id: "{{tools.sample_id}}"
                  sample_name: "{{tools.sample_name}}"
                  operator: "{{tools.operator}}"

        - name: measurements
          path: /api/measurements
          description: "Stored measurement records."
          operations:
            - name: get-measurements
              method: GET
              description: "Retrieve stored measurements with date and method filtering."
              inputParameters:
                - name: from_date
                  in: query
                  type: string
                  required: false
                  description: "From date filter."
                - name: to_date
                  in: query
                  type: string
                  required: false
                  description: "To date filter."
                - name: method
                  in: query
                  type: string
                  required: false
                  description: "Method filter."
                - name: sample_id
                  in: query
                  type: string
                  required: false
                  description: "Sample ID filter."
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum records to return."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: measurement-by-id
          path: /api/measurements/{measurementId}
          description: "Retrieve a specific measurement with full spectrum data."
          operations:
            - name: get-measurement-by-id
              method: GET
              description: "Get full measurement data including spectrum for a specific measurement ID."
              inputParameters:
                - name: measurementId
                  in: path
                  type: string
                  required: true
                  description: "Unique measurement identifier."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: methods
          path: /api/methods
          description: "Available measurement methods."
          operations:
            - name: get-methods
              method: GET
              description: "List available measurement methods configured on the instrument."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: export
          path: /api/export
          description: "Export measurement data."
          operations:
            - name: export-measurements
              method: POST
              description: "Export measurements in CSV, JSON, or XML format for LIMS integration."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  format: "{{tools.format}}"
                  from_date: "{{tools.from_date}}"
                  to_date: "{{tools.to_date}}"

  exposes:
    - type: rest
      port: 8101
      namespace: nanodrop-rest
      resources:
        - path: /v1/instrument/status
          name: instrument-status
          description: "Instrument status."
          operations:
            - method: GET
              name: get-status
              description: "Get instrument status."
              call: "nanodrop.get-instrument-status"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/measurements
          name: measurements
          description: "Measurements list."
          operations:
            - method: GET
              name: get-measurements
              description: "List stored measurements."
              call: "nanodrop.get-measurements"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: perform-measurement
              description: "Perform a new measurement."
              call: "nanodrop.perform-measurement"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/measurements/{measurementId}
          name: measurement
          description: "Individual measurement data."
          operations:
            - method: GET
              name: get-measurement
              description: "Get specific measurement with spectrum."
              call: "nanodrop.get-measurement-by-id"
              with:
                measurementId: "rest.measurementId"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: nanodrop-mcp
      transport: http
      tools:
        - name: get-instrument-status
          description: "Check the status and readiness of the NanoDrop Ultra spectrophotometer."
          hints:
            readOnly: true
            idempotent: true
          call: "nanodrop.get-instrument-status"
          outputParameters:
            - type: object
              mapping: "$."

        - name: perform-measurement
          description: "Perform a UV-Vis spectrophotometric measurement on the NanoDrop Ultra."
          hints:
            readOnly: false
          call: "nanodrop.perform-measurement"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-measurements
          description: "Retrieve stored NanoDrop Ultra measurements with optional date and method filtering."
          hints:
            readOnly: true
            idempotent: true
          call: "nanodrop.get-measurements"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-measurement-by-id
          description: "Get full measurement data including absorbance spectrum for a specific measurement."
          hints:
            readOnly: true
            idempotent: true
          call: "nanodrop.get-measurement-by-id"
          with:
            measurementId: "tools.measurementId"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-methods
          description: "List available measurement methods on the NanoDrop Ultra instrument."
          hints:
            readOnly: true
            idempotent: true
          call: "nanodrop.get-methods"
          outputParameters:
            - type: object
              mapping: "$."

        - name: export-measurements
          description: "Export NanoDrop Ultra measurements in JSON, CSV, or XML for LIMS integration."
          hints:
            readOnly: true
            idempotent: true
          call: "nanodrop.export-measurements"
          outputParameters:
            - type: object
              mapping: "$."
