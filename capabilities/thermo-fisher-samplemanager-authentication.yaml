naftiko: 1.0.0-alpha2
info:
  label: Thermo Fisher SampleManager LIMS REST API — Authentication
  description: 'Thermo Fisher SampleManager LIMS REST API — Authentication. 2 operations. Lead operation: Login. Self-contained
    Naftiko capability covering one Thermo Fisher Scientific business surface.'
  tags:
  - Thermo Fisher Scientific
  - Authentication
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    THERMO_FISHER_SCIENTIFIC_API_KEY: THERMO_FISHER_SCIENTIFIC_API_KEY
capability:
  consumes:
  - type: http
    namespace: thermo-fisher-samplemanager-authentication
    baseUri: https://{server}:{port}/smpwcfrestvgsm
    description: Thermo Fisher SampleManager LIMS REST API — Authentication business capability. Self-contained, no shared
      references.
    resources:
    - name: mobile-login
      path: /mobile/login
      operations:
      - name: login
        method: POST
        description: Login
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: mobile-logout
      path: /mobile/logout
      operations:
      - name: logout
        method: POST
        description: Logout
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.THERMO_FISHER_SCIENTIFIC_API_KEY}}'
  exposes:
  - type: rest
    namespace: thermo-fisher-samplemanager-authentication-rest
    port: 8080
    description: REST adapter for Thermo Fisher SampleManager LIMS REST API — Authentication. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/mobile/login
      name: mobile-login
      description: REST surface for mobile-login.
      operations:
      - method: POST
        name: login
        description: Login
        call: thermo-fisher-samplemanager-authentication.login
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/mobile/logout
      name: mobile-logout
      description: REST surface for mobile-logout.
      operations:
      - method: POST
        name: logout
        description: Logout
        call: thermo-fisher-samplemanager-authentication.logout
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: thermo-fisher-samplemanager-authentication-mcp
    port: 9090
    transport: http
    description: MCP adapter for Thermo Fisher SampleManager LIMS REST API — Authentication. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: login
      description: Login
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: thermo-fisher-samplemanager-authentication.login
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: logout
      description: Logout
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: thermo-fisher-samplemanager-authentication.logout
      outputParameters:
      - type: object
        mapping: $.
