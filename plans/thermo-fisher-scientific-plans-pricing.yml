description: >-
  Thermo Fisher Scientific is a Fortune 500 life-sciences and laboratory products company; instrument,
  reagent, and software (LIMS, ELN, digital science platform) commercial terms are sales-led. Public web
  catalog pricing exists for consumables, but there is no public developer API price list, plan tier card,
  or self-service signup for the digital science platform.
